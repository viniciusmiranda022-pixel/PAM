# Reverse proxy — ativado com o profile "app" a partir da Fase 1.
# TLS terminado aqui; única porta exposta ao usuário é a 443.

server {
    listen 443 ssl;
    server_name _;

    ssl_certificate     /etc/nginx/certs/server.crt;
    ssl_certificate_key /etc/nginx/certs/server.key;
    ssl_protocols       TLSv1.2 TLSv1.3;

    add_header Strict-Transport-Security "max-age=31536000" always;
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;

    # Portal web (estático)
    location / {
        proxy_pass http://frontend:8080;
    }

    # Backend API
    location /api/ {
        proxy_pass http://backend:3000;
        # $remote_addr SOBRESCREVE o header: um X-Forwarded-For forjado pelo
        # cliente nunca chega ao backend (HR-10 — IP de auditoria confiavel).
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto https;
    }

    # Gateway VNC — upgrade WebSocket (WSS).
    # Access log desativado neste location para não registrar headers de
    # upgrade (o token efêmero trafega em Sec-WebSocket-Protocol).
    location /gateway/ {
        access_log off;
        proxy_pass http://gateway:8081;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        # Sobrescreve (nao anexa) — mesmo motivo do bloco /api/.
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }
}
