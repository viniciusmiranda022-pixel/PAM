# PAM VNC-Only — topologia local
#
# Redes:
#   app_net    — nginx, frontend, backend, gateway, postgres, vault
#   assets_net — SOMENTE gateway + assets VNC (internal: sem rota para o host)
#                → materializa HR-07: usuário nunca alcança o asset diretamente.
#
# Fase 0: sobem apenas postgres e o asset VNC de laboratório.
# Serviços de aplicação ficam sob o profile "app" (ativados a partir da Fase 1):
#   docker compose --profile app up -d

name: pam-vnc

networks:
  app_net:
  assets_net:
    internal: true
    ipam:
      config:
        - subnet: 172.28.0.0/24

volumes:
  pgdata:
  recordings:

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-pam}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?defina POSTGRES_PASSWORD no infra/.env}
      POSTGRES_DB: ${POSTGRES_DB:-pam}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d:ro
    networks: [app_net]
    ports:
      - "127.0.0.1:5432:5432" # apenas conveniência de dev local
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-pam} -d ${POSTGRES_DB:-pam}"]
      interval: 5s
      timeout: 3s
      retries: 10

  # Asset VNC de laboratório (TigerVNC + XFCE, RFB 3.8 na porta 5901).
  # Nenhuma porta publicada: só é alcançável via assets_net — ou seja, só pelo
  # gateway. Senha limitada a 8 caracteres (limitação do VNC Authentication).
  lab-vnc:
    image: consol/rocky-xfce-vnc:latest
    restart: unless-stopped
    environment:
      VNC_PW: ${LAB_VNC_PASSWORD:-labonly1}
    networks:
      assets_net:
        # IP fixo: o backend seeda o asset com este endereco (destino do banco).
        ipv4_address: 172.28.0.10

  # ────────────────────────── Fase 1+ (profile: app) ──────────────────────────

  gateway:
    profiles: [app]
    build: ../gateway
    restart: unless-stopped
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-pam}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-pam}
      # Providers de credencial: env:* (lab) e enc:v1 (cifra AES-GCM da Fase 2).
      # A master key precisa ser IDENTICA no backend e no gateway. Fase 3: Vault.
      LAB_VNC_PASSWORD: ${LAB_VNC_PASSWORD:-labonly1}
      CREDENTIAL_MASTER_KEY: ${CREDENTIAL_MASTER_KEY:?defina CREDENTIAL_MASTER_KEY no infra/.env}
      # Vault (Fase 3): usado quando algum asset tiver credential_ref vault:*
      VAULT_ADDR: ${VAULT_ADDR:-http://vault:8200}
      VAULT_TOKEN: ${VAULT_TOKEN:-root}
      VAULT_KV_MOUNT: ${VAULT_KV_MOUNT:-secret}
      # Gravacao de sessao (Fase 5.1). Vazio desliga a gravacao globalmente.
      RECORDINGS_DIR: /recordings
      # VeNCrypt (Fase 5.4): TLS gateway->asset p/ assets com tls_required.
      # Producao: VENCRYPT_CA_FILE. Lab: VENCRYPT_INSECURE=true (autoassinado).
      VENCRYPT_INSECURE: ${VENCRYPT_INSECURE:-false}
      VENCRYPT_CA_FILE: ${VENCRYPT_CA_FILE:-}
    volumes:
      - recordings:/recordings
    networks: [app_net, assets_net] # único serviço com pé nas duas redes
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:8081/healthz').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 5
    depends_on:
      postgres:
        condition: service_healthy

  backend:
    profiles: [app]
    build: ../backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-pam}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-pam}
      COOKIE_SECRET: ${COOKIE_SECRET:?defina COOKIE_SECRET no infra/.env}
      GATEWAY_PUBLIC_URL: ${GATEWAY_PUBLIC_URL:-wss://localhost/gateway/vnc}
      SECURE_COOKIE: ${SECURE_COOKIE:-true}
      CREDENTIAL_MASTER_KEY: ${CREDENTIAL_MASTER_KEY:?defina CREDENTIAL_MASTER_KEY no infra/.env}
      # Provider de credencial: enc (AES-GCM, default) | vault (HashiCorp Vault)
      CREDENTIAL_PROVIDER: ${CREDENTIAL_PROVIDER:-enc}
      VAULT_ADDR: ${VAULT_ADDR:-http://vault:8200}
      VAULT_TOKEN: ${VAULT_TOKEN:-root}
      VAULT_KV_MOUNT: ${VAULT_KV_MOUNT:-secret}
      RATE_LIMIT_LOGIN_PER_MIN: ${RATE_LIMIT_LOGIN_PER_MIN:-5}
      RATE_LIMIT_SESSION_PER_MIN: ${RATE_LIMIT_SESSION_PER_MIN:-10}
      # SSO/OIDC (Fase 5.5) — opcional. Definindo os 4 primeiros, o botao
      # "Entrar com SSO" aparece e o Authorization Code flow fica ativo.
      OIDC_ISSUER: ${OIDC_ISSUER:-}
      OIDC_CLIENT_ID: ${OIDC_CLIENT_ID:-}
      OIDC_CLIENT_SECRET: ${OIDC_CLIENT_SECRET:-}
      OIDC_REDIRECT_URI: ${OIDC_REDIRECT_URI:-}
      OIDC_AUTO_PROVISION: ${OIDC_AUTO_PROVISION:-true}
    volumes:
      # Somente leitura: o backend apenas serve as gravacoes ao admin.
      - recordings:/recordings:ro
    networks: [app_net] # sem rota para assets_net, por design
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000/healthz').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 5
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    profiles: [app]
    build: ../frontend
    restart: unless-stopped
    networks: [app_net]

  nginx:
    profiles: [app]
    image: nginx:1.27-alpine
    restart: unless-stopped
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    ports:
      - "443:443" # única porta exposta ao usuário
    networks: [app_net]
    depends_on: [backend, gateway, frontend]

  # Cofre de credenciais — modo dev (root token fixo, KV v2 em 'secret/').
  # Só é necessário quando CREDENTIAL_PROVIDER=vault. Produção usa storage
  # persistente, unseal e AppRole (fora do escopo do lab).
  vault:
    profiles: [app]
    image: hashicorp/vault:1.17
    restart: unless-stopped
    cap_add: [IPC_LOCK]
    environment:
      VAULT_DEV_LISTEN_ADDRESS: 0.0.0.0:8200
      VAULT_DEV_ROOT_TOKEN_ID: ${VAULT_TOKEN:-root}
    networks: [app_net]
