name: CI

on:
  push:
    branches: ["**"]
  pull_request:

# Nota de governanca: o branch default do repositorio deve ser `main` (definido
# manualmente em Settings > Branches). Este workflow roda em todo push/PR.
#
# Supply chain: menor privilegio por padrao; toda action e fixada por commit SHA
# completo (referencia imutavel).
permissions:
  contents: read

jobs:
  build-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: pam
          POSTGRES_PASSWORD: pam
          POSTGRES_DB: pam
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U pam -d pam"
          --health-interval 5s --health-timeout 3s --health-retries 10

    env:
      # KDF barato no CI (ADR 0002 permite; nunca em producao).
      SCRYPT_N: "16384"
      DATABASE_URL: postgres://pam:pam@localhost:5432/pam
      PAM_APP_URL: postgres://pam_app:apppw@localhost:5432/pam
      PAM_APP_PASSWORD: apppw

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: "22"

      # ── Barreiras de escopo (rapidas, antes de instalar) ──────────────────
      - name: Scan de segredos (HR-06)
        run: bash scripts/ci/scan-secrets.sh
      - name: Scan de dependencia de proxy generico (HR-08/HR-09)
        run: bash scripts/ci/scan-forbidden-deps.sh

      # ── Backend ───────────────────────────────────────────────────────────
      - name: Backend — install
        working-directory: backend
        run: npm ci
      - name: Backend — typecheck
        working-directory: backend
        run: npm run typecheck
      - name: Backend — unit tests
        working-directory: backend
        run: npm test
      - name: Backend — build
        working-directory: backend
        run: npm run build

      # ── Gateway ───────────────────────────────────────────────────────────
      - name: Gateway — install
        working-directory: gateway
        run: npm ci
      - name: Gateway — typecheck
        working-directory: gateway
        run: npm run typecheck
      - name: Gateway — unit tests
        working-directory: gateway
        run: npm test
      - name: Gateway — build
        working-directory: gateway
        run: npm run build

      # ── Frontend (estatico: sem build; so checagem de sintaxe) ─────────────
      - name: Frontend — install
        working-directory: frontend
        run: npm ci
      - name: Frontend — syntax check
        working-directory: frontend
        run: |
          node --check server.mjs
          for f in public/*.js; do node --check "$f"; done

      # ── Suite transversal: integracao + seguranca (Postgres real) ─────────
      # Importa o build de backend/gateway (feito acima) e sobe o schema +
      # role pam_app a partir de um Postgres vazio (helper faz o bootstrap).
      - name: Tests — install
        working-directory: tests
        run: npm ci
      - name: Tests — integração + segurança
        working-directory: tests
        run: npm test

      # ── Validacao do Compose (sintaxe/interpolacao) ───────────────────────
      - name: Docker Compose — validar
        working-directory: infra
        env:
          POSTGRES_PASSWORD: ci-dummy
          COOKIE_SECRET: ci-dummy-cookie-secret-32bytes!!
          CREDENTIAL_MASTER_KEY: ci-dummy-master-key-base64==
        run: docker compose -f docker-compose.yml config -q

  # ── RDP Worker (spike, LAB ONLY — PR-17B / ADR 0006) ────────────────────────
  # Logic build + unit tests run offline; the native build (FreeRDP 3.28.0 pinned
  # by committed commit SHA) runs via Docker on the runner. Job separado.
  rdp-worker-build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      # Barreira anti-integração acidental + scans de segredo (cobrem o worker).
      - name: Scope guard (anti-integração)
        run: bash scripts/ci/check-rdp-worker-scope.sh
      - name: Scan de segredos (HR-06)
        run: bash scripts/ci/scan-secrets.sh

      # Driver do smoke P0: sintaxe, ShellCheck e a suíte offline (stubs de worker
      # e harness sobre UDS real). Não sobe alvo RDP; só valida o script/execução.
      - name: P0 driver — bash -n, ShellCheck, offline tests
        working-directory: rdp-worker
        run: |
          bash -n scripts/run-p0.sh
          bash -n tests/run-p0-script-test.sh
          python3 -c "import ast; ast.parse(open('scripts/p0-evidence-secret-scan.py').read())"
          if ! command -v shellcheck >/dev/null 2>&1; then
            sudo apt-get update && sudo apt-get install -y --no-install-recommends shellcheck
          fi
          shellcheck -x scripts/run-p0.sh tests/run-p0-script-test.sh
          bash tests/run-p0-script-test.sh

      # Valida que a tag oficial ainda aponta para o commit SHA COMMITADO do
      # FreeRDP; falha se divergir (sem resolução dinâmica no build).
      - name: Verificar pin do FreeRDP (commit SHA committado)
        working-directory: rdp-worker
        run: ./scripts/pin-freerdp.sh

      - name: Toolchain C++ (cmake/ninja/g++)
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends cmake ninja-build g++

      # Fase lógica (sem libfreerdp): compila com -Werror e roda os unit tests.
      - name: Logic build + unit tests
        working-directory: rdp-worker
        run: |
          ./scripts/build.sh
          ctest --test-dir build --output-on-failure
      - name: Selftest (logic)
        working-directory: rdp-worker
        run: ./scripts/run-selftest.sh

      # Fase nativa: build da imagem (compila FreeRDP do commit fixado, roda
      # testes + selftest dentro do container) e confirma a versão carregada.
      - name: Native build (Docker, FreeRDP 3.28.0 pinado por commit SHA)
        run: docker build --platform=linux/amd64 -f rdp-worker/Dockerfile -t privion-rdp-worker-lab:ci rdp-worker
      - name: Selftest nativo (confirma FreeRDP 3.28.0)
        run: docker run --rm privion-rdp-worker-lab:ci --selftest

      # Comprova que as libs nativas realmente existem na imagem final e que o
      # binário carrega sem dependência ausente — o SBOM só reflete o que existe.
      - name: Verificar bibliotecas nativas na imagem
        run: |
          docker run --rm \
            --entrypoint /bin/sh \
            privion-rdp-worker-lab:ci \
            -ec '
              ldd /usr/local/bin/privion-rdp-worker-lab
              ! ldd /usr/local/bin/privion-rdp-worker-lab | grep -q "not found"
              find /usr/local/lib -name "libfreerdp*.so*" | grep -q .
              find /usr/local/lib -name "libwinpr*.so*" | grep -q .
            '

      # SBOM COMPLETO da imagem runtime final. syft vem da AÇÃO OFICIAL fixada
      # pelo commit SHA completo (não do install.sh da branch main mutável).
      - name: Gerar SBOM (CycloneDX) — anchore/sbom-action fixada por commit
        uses: anchore/sbom-action@df80a981bc6edbc4e220a492d3cbe9f5547a6e75 # v0.17.9
        with:
          image: privion-rdp-worker-lab:ci
          format: cyclonedx-json
          output-file: rdp-worker/sbom.cyclonedx.json
          upload-artifact: false
      # FreeRDP/WinPR são compilados do source (não vêm de gerenciador de pacote),
      # então syft não os cataloga; adiciona-os com proveniência do pin.
      - name: Completar SBOM com FreeRDP/WinPR (build from source)
        run: python3 rdp-worker/scripts/augment-sbom.py rdp-worker/sbom.cyclonedx.json
      # Sem fallback: se o SBOM não tiver FreeRDP/WinPR/OpenSSL/zlib, o job falha.
      - name: Validar SBOM (componentes nativos presentes)
        run: python3 rdp-worker/scripts/validate-sbom.py rdp-worker/sbom.cyclonedx.json
      - name: Publicar SBOM
        uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882 # v4.4.3
        with:
          name: rdp-worker-sbom
          path: rdp-worker/sbom.cyclonedx.json
